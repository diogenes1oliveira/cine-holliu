# -----------------------------------------------------------------------------
# Deploy MkDocs static site to Cloudflare Pages (optional alternative to GitHub Pages)
#
# This workflow builds the site with MkDocs and deploys the output to Cloudflare
# Pages. Pages is Cloudflare's static hosting (runs on their Workers edge).
# Your custom domain (e.g. 001481.xyz) is configured in the Cloudflare dashboard,
# not in this file.
#
# HOW TO ENABLE:
# 1. Create a Cloudflare Pages project (optional but recommended):
#    Dashboard → Workers & Pages → Create application → Pages → Create project.
#    Name it e.g. "cine-holliu" and note the name for CLOUDFLARE_PAGES_PROJECT_NAME.
#
# 2. Add GitHub Actions secrets (Settings → Secrets and variables → Actions):
#    - CLOUDFLARE_API_TOKEN   — Create at Cloudflare: My Profile → API Tokens →
#                               Create Token → "Cloudflare Pages Edit" template,
#                               or Custom with Account / Cloudflare Pages / Edit.
#    - CLOUDFLARE_ACCOUNT_ID  — In Cloudflare dashboard, right-hand sidebar
#                               under "Account ID" (or from any zone overview).
#    - CLOUDFLARE_PAGES_PROJECT_NAME — The Pages project name (e.g. cine-holliu).
#      Alternatively, hardcode projectName in the "Deploy" step below.
#
# 3. Add your custom domain (e.g. 001481.xyz):
#    In Cloudflare: Workers & Pages → your project → Custom domains →
#    Set up a custom domain → enter 001481.xyz and follow DNS instructions
#    (if the domain is on Cloudflare, DNS is usually automatic).
#
# 4. To use this instead of GitHub Pages: either disable the "Deploy to GitHub
#    Pages" workflow or remove it; ensure mkdocs.yml site_url is set to
#    https://001481.xyz/ (or your chosen domain).
#
# Trigger: push to main, or run manually from the Actions tab.
# -----------------------------------------------------------------------------

name: Deploy to Cloudflare Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Build and deploy to Cloudflare Pages
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          version: "latest"
          python-version: "3.12"

      - name: Sync dependencies
        run: uv sync --frozen

      - name: Build site
        run: uv run mkdocs build
        # Output is in site/ (MkDocs default)

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # Deploy the built static site. Either set secret CLOUDFLARE_PAGES_PROJECT_NAME
          # or hardcode: --project-name=cine-holliu
          command: pages deploy site --project-name=${{ secrets.CLOUDFLARE_PAGES_PROJECT_NAME }}
          # Optional: report deployment status to GitHub
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
