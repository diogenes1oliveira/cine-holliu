site_name: Cine Holliu
site_description: A drugless trip through the Fundamentals of Prompt Engineering
site_url: https://diogenes1oliveira.github.io/cine-holliu/

docs_dir: docs

nav:
  - Home: index.md
  - Chat History: chats.md
  - Protocol: protocol.md
  - Agents Guide: agents.md
  - LLM Parameters: llm-parameters.md
  - Deployment Checklist: deployment.md

theme:
  name: material
  palette:
    - scheme: default
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - content.code.copy
    - search.suggest
    - search.highlight

plugins:
  - search

markdown_extensions:
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - admonition
  - pymdownx.details
  - attr_list
  - tables
